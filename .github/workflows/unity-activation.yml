name: Unity Activation File anfordern

# Einmalig nötig, um eine Unity-Personal-Lizenz für CI zu aktivieren.
# Ablauf:
#   1. Actions → "Unity Activation File anfordern" → Run workflow.
#   2. Nach dem Lauf das Artifact "Unity_Activation_File" herunterladen
#      (enthält eine .alf-Datei).
#   3. Auf https://license.unity3d.com/manual die .alf hochladen,
#      Lizenztyp wählen (Personal) → es wird eine .ulf-Datei erzeugt.
#   4. Inhalt der .ulf als Repository-Secret UNITY_LICENSE speichern.
# Danach läuft der Workflow "Unity Android Build".
#
# Anleitung: https://game.ci/docs/github/activation

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  activation:
    name: Activation-Datei erzeugen
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Request manual activation file
        id: getManualLicenseFile
        uses: game-ci/unity-request-activation-file@v2
        with:
          unityVersion: 6000.4.9f1

      - name: Upload activation file
        uses: actions/upload-artifact@v4
        with:
          name: Unity_Activation_File
          path: ${{ steps.getManualLicenseFile.outputs.filePath }}
          if-no-files-found: error
