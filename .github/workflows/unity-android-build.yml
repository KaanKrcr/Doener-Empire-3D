name: Unity Android Build

# Baut die Android-App (APK oder AAB) via game-ci/unity-builder.
# Vorgeschaltet: die UnityEngine-freien Logic-Tests als schnelles Gate.
#
# ── Benötigte Repository-Secrets ─────────────────────────────────────────────
# Pflicht (Unity-Lizenz, eine der beiden Varianten):
#   UNITY_LICENSE        Inhalt der .ulf-Lizenzdatei (Personal/Plus; via
#                        game-ci activation erzeugt). ODER:
#   UNITY_SERIAL         Pro/Plus-Seriennummer  (+ UNITY_EMAIL, UNITY_PASSWORD)
#   UNITY_EMAIL          Unity-Account-E-Mail
#   UNITY_PASSWORD       Unity-Account-Passwort
#
# Optional (nur für signierte Release-Builds; ohne diese → Debug-Signing):
#   ANDROID_KEYSTORE_BASE64   base64 des .keystore (z.B. `base64 -w0 key.keystore`)
#   ANDROID_KEYSTORE_PASS     Keystore-Passwort
#   ANDROID_KEYALIAS_NAME     Key-Alias-Name
#   ANDROID_KEYALIAS_PASS     Key-Alias-Passwort
#
# Anleitung Lizenz: https://game.ci/docs/github/activation
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      exportType:
        description: 'Build-Ausgabe'
        type: choice
        default: androidPackage
        options:
          - androidPackage      # .apk (interner Test)
          - androidAppBundle    # .aab (Google Play)
  push:
    tags:
      - 'android-v*'            # z.B. Tag `android-v1.0` löst einen Build aus

permissions:
  contents: read

jobs:
  test:
    name: Logic-Tests (Gate)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Test
        working-directory: unity-logic-tests/DoenerEmpire.Logic.Tests
        run: dotnet test --configuration Release --logger "console;verbosity=normal"

  build:
    name: Unity Android Build
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      # Library-Cache beschleunigt Folge-Builds erheblich.
      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: unity/Library
          key: Library-Android-${{ hashFiles('unity/Assets/**', 'unity/Packages/**', 'unity/ProjectSettings/**') }}
          restore-keys: |
            Library-Android-
            Library-

      - name: Build Android
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: unity
          targetPlatform: Android
          # CI nutzt 6000.4.10f1 (game-ci hat KEIN Docker-Image für das lokal
          # installierte 6000.4.9f1; 10f1 ist eine Patch-Version neuer, gleiche
          # Minor — öffnet das Projekt problemlos). Lokal bleibt 6000.4.9f1.
          unityVersion: 6000.4.10f1
          # Version aus ProjectSettings (bundleVersion) statt aus Git ableiten —
          # verhindert "Branch is dirty"-Abbruch durch LFS-normalisierte Assets.
          versioning: None
          # unityVersion wird aus unity/ProjectSettings/ProjectVersion.txt gelesen
          # (6000.4.9f1) — kein explizites Setzen nötig.
          androidExportType: ${{ github.event.inputs.exportType || 'androidPackage' }}
          androidKeystoreName: doener_empire.keystore
          androidKeystoreBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          androidKeystorePass: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          androidKeyaliasName: ${{ secrets.ANDROID_KEYALIAS_NAME }}
          androidKeyaliasPass: ${{ secrets.ANDROID_KEYALIAS_PASS }}

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: doener-empire-android
          path: build/Android
          if-no-files-found: warn
