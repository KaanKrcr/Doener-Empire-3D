name: Unity Logic Tests

# Schützt die UnityEngine-freie Logikschicht (Core/Models/Data/Save/Simulation)
# gegen Regressions. Läuft schnell (kein Unity, kein Flutter) und ist damit
# das ideale Gate für jeden Codex/Claude-Commit am Unity-Port.

on:
  push:
    branches: [main]
    paths:
      - 'unity/Assets/Scripts/Core/**'
      - 'unity/Assets/Scripts/Models/**'
      - 'unity/Assets/Scripts/Data/**'
      - 'unity/Assets/Scripts/Save/**'
      - 'unity/Assets/Scripts/Simulation/**'
      - 'unity-logic-tests/**'
      - '.github/workflows/unity-logic-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'unity/Assets/Scripts/Core/**'
      - 'unity/Assets/Scripts/Models/**'
      - 'unity/Assets/Scripts/Data/**'
      - 'unity/Assets/Scripts/Save/**'
      - 'unity/Assets/Scripts/Simulation/**'
      - 'unity-logic-tests/**'
      - '.github/workflows/unity-logic-tests.yml'
  workflow_dispatch:

jobs:
  test:
    name: dotnet test (logic)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        working-directory: unity-logic-tests/DoenerEmpire.Logic.Tests
        run: dotnet restore

      - name: Build
        working-directory: unity-logic-tests/DoenerEmpire.Logic.Tests
        run: dotnet build --no-restore --configuration Release

      - name: Test
        working-directory: unity-logic-tests/DoenerEmpire.Logic.Tests
        run: dotnet test --no-build --configuration Release --logger "trx;LogFileName=test-results.trx" --logger "console;verbosity=normal"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: unity-logic-tests/DoenerEmpire.Logic.Tests/TestResults/*.trx
          if-no-files-found: ignore
